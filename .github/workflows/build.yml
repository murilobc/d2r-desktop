name: Build Installers

on:
  push:
    tags:
      - "v*"
      - "rc-*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Determine release type
        id: release-type
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == rc-* ]]; then
            VERSION="${TAG#rc-}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_test=true" >> $GITHUB_OUTPUT
            echo "release_name=D2R Tracker $TAG (Test Build)" >> $GITHUB_OUTPUT
            echo "release_body=⚠️ This is a test build for internal testing. Do not use in production." >> $GITHUB_OUTPUT
          else
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
            echo "release_name=D2R Tracker $TAG" >> $GITHUB_OUTPUT
            echo "release_body=Download installers below. Windows: .exe/.msi | Linux: .deb (Ubuntu/Debian), .rpm (Fedora), .AppImage (universal)." >> $GITHUB_OUTPUT
          fi

      - name: Update version in package.json
        shell: bash
        run: sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.release-type.outputs.version }}\"/" package.json

      - name: Update version in tauri.conf.json
        shell: bash
        run: sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.release-type.outputs.version }}\"/" src-tauri/tauri.conf.json

      - name: Update version in Cargo.toml
        shell: bash
        run: sed -i "0,/^version = \".*\"/s//version = \"${{ steps.release-type.outputs.version }}\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release-type.outputs.release_name }}
          releaseBody: ${{ steps.release-type.outputs.release_body }}
          releaseDraft: ${{ steps.release-type.outputs.is_test == 'false' }}
          prerelease: ${{ steps.release-type.outputs.is_test == 'true' }}
          includeUpdaterJson: ${{ steps.release-type.outputs.is_test == 'false' }}
