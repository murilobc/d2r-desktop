name: Build Installers

on:
  push:
    tags:
      - "v*"
      - "rc-*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release type
        id: release-type
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == rc-* ]]; then
            VERSION="${TAG#rc-}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_test=true" >> $GITHUB_OUTPUT
            echo "release_name=D2R Tracker $TAG (Test Build)" >> $GITHUB_OUTPUT
          else
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
            echo "release_name=D2R Tracker $TAG" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | grep "^v" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Previous tag: $PREV_TAG"

          # Generate changelog from conventional commits
          FEATURES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"%s" --no-merges | grep "^feat:" | sed 's/^feat: /- ✨ /' || true)
          FIXES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"%s" --no-merges | grep "^fix:" | sed 's/^fix: /- 🐛 /' || true)
          STYLES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"%s" --no-merges | grep "^style:" | sed 's/^style: /- 🎨 /' || true)
          REFACTORS=$(git log "$PREV_TAG".."$TAG" --pretty=format:"%s" --no-merges | grep "^refactor:" | sed 's/^refactor: /- ♻️ /' || true)
          CHORES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"%s" --no-merges | grep "^chore:" | sed 's/^chore: /- 🔧 /' || true)

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## ✨ New Features"$'\n'"${FEATURES}"$'\n\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Bug Fixes"$'\n'"${FIXES}"$'\n\n'
          fi
          if [ -n "$STYLES" ]; then
            BODY="${BODY}## 🎨 UI Improvements"$'\n'"${STYLES}"$'\n\n'
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}## ♻️ Refactors"$'\n'"${REFACTORS}"$'\n\n'
          fi
          if [ -n "$CHORES" ]; then
            BODY="${BODY}## 🔧 Maintenance"$'\n'"${CHORES}"$'\n\n'
          fi

          if [ -z "$BODY" ]; then
            BODY="Maintenance release with minor improvements."$'\n\n'
          fi

          BODY="${BODY}---"$'\n'"📥 **Download installers below.**"$'\n'"- Windows: .exe / .msi"$'\n'"- Linux: .deb (Ubuntu/Debian), .rpm (Fedora), .AppImage (universal)"

          # Use delimiter for multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        shell: bash
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.release-type.outputs.version }}\"/" package.json

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.release-type.outputs.version }}\"/" src-tauri/tauri.conf.json

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          sed -i "0,/^version = \".*\"/s//version = \"${{ steps.release-type.outputs.version }}\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release-type.outputs.release_name }}
          releaseBody: ${{ steps.release-type.outputs.is_test == 'true' && '⚠️ This is a test build for internal testing.' || steps.changelog.outputs.body }}
          releaseDraft: ${{ steps.release-type.outputs.is_test == 'false' }}
          prerelease: ${{ steps.release-type.outputs.is_test == 'true' }}
          includeUpdaterJson: ${{ steps.release-type.outputs.is_test == 'false' }}
