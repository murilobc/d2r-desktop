<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Nav Items -->
  <text x="20" y="85" fill="#eaeaea" font-size="13" opacity="0.6">◎ Profiles</text>
  <text x="20" y="115" fill="#eaeaea" font-size="13" opacity="0.6">▶ Run Tracker</text>
  <text x="20" y="145" fill="#eaeaea" font-size="13" opacity="0.6">↗ Routes</text>
  <text x="20" y="175" fill="#eaeaea" font-size="13" opacity="0.6">☰ History</text>
  <text x="20" y="205" fill="#eaeaea" font-size="13" opacity="0.6">◈ Statistics</text>
  <text x="20" y="235" fill="#eaeaea" font-size="13" opacity="0.6">⇄ Compare</text>
  <text x="20" y="265" fill="#eaeaea" font-size="13" opacity="0.6">◆ Heralds</text>
  <text x="20" y="295" fill="#eaeaea" font-size="13" opacity="0.6">▣ Ancients</text>
  <text x="20" y="325" fill="#eaeaea" font-size="13" opacity="0.6">※ DClone</text>
  <text x="20" y="355" fill="#eaeaea" font-size="13" opacity="0.6">△ XP</text>
  <text x="20" y="385" fill="#eaeaea" font-size="13" opacity="0.6">∿ Drops</text>
  <rect x="0" y="400" width="220" height="30" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="400" width="3" height="30" fill="#e94560"/>
  <text x="20" y="415" fill="#eaeaea" font-size="13">⇌ Co-op</text>

  <!-- Separator -->
  <line x1="10" y1="440" x2="210" y2="440" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Bottom Nav -->
  <text x="20" y="465" fill="#eaeaea" font-size="13" opacity="0.6">⚙ Settings</text>
  <text x="20" y="495" fill="#eaeaea" font-size="13" opacity="0.6">◳ Overlay</text>
  <text x="20" y="525" fill="#eaeaea" font-size="13" opacity="0.6">● Theme</text>
  <text x="20" y="555" fill="#eaeaea" font-size="13" opacity="0.6">↓ Export</text>
  <text x="20" y="585" fill="#eaeaea" font-size="13" opacity="0.6">↑ Import</text>

  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Co-op</text>
  <rect x="370" y="28" width="80" height="28" rx="4" fill="#4ecdc4"/>
  <text x="383" y="47" fill="#1a1a2e" font-size="12" font-weight="bold">Hosting</text>

  <!-- Session Info -->
  <rect x="250" y="65" width="815" height="35" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="87" fill="#a0a0a0" font-size="11">Code:</text>
  <text x="305" y="87" fill="#eaeaea" font-size="12" font-weight="bold">XK7M2P</text>
  <text x="400" y="87" fill="#a0a0a0" font-size="11">IP:</text>
  <text x="418" y="87" fill="#eaeaea" font-size="12">192.168.1.42:9876</text>

  <!-- Combined Stats -->
  <rect x="250" y="115" width="190" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="345" y="145" fill="#eaeaea" font-size="18" font-weight="bold" text-anchor="middle">24</text>
  <text x="345" y="168" fill="#a0a0a0" font-size="11" text-anchor="middle">Total Runs</text>

  <rect x="455" y="115" width="190" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="550" y="145" fill="#eaeaea" font-size="18" font-weight="bold" text-anchor="middle">17</text>
  <text x="550" y="168" fill="#a0a0a0" font-size="11" text-anchor="middle">Total Items</text>

  <rect x="660" y="115" width="190" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="755" y="145" fill="#eaeaea" font-size="18" font-weight="bold" text-anchor="middle">01:32:15</text>
  <text x="755" y="168" fill="#a0a0a0" font-size="11" text-anchor="middle">Session Time</text>

  <rect x="865" y="115" width="190" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="960" y="145" fill="#eaeaea" font-size="18" font-weight="bold" text-anchor="middle">11.1</text>
  <text x="960" y="168" fill="#a0a0a0" font-size="11" text-anchor="middle">Items/Hour</text>

  <!-- Connected Players -->
  <rect x="250" y="200" width="390" height="160" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="228" fill="#eaeaea" font-size="15" font-weight="bold">Players (3)</text>

  <circle cx="282" cy="258" r="5" fill="#4ecdc4"/>
  <text x="295" y="263" fill="#eaeaea" font-size="13">MFSorc</text>
  <text x="530" y="263" fill="#a0a0a0" font-size="11" text-anchor="end">8 items</text>

  <circle cx="282" cy="290" r="5" fill="#4ecdc4"/>
  <text x="295" y="295" fill="#eaeaea" font-size="13">HammerBro</text>
  <text x="530" y="295" fill="#a0a0a0" font-size="11" text-anchor="end">6 items</text>

  <circle cx="282" cy="322" r="5" fill="#ffd700"/>
  <text x="295" y="327" fill="#eaeaea" font-size="13">JavaZon99</text>
  <text x="530" y="327" fill="#a0a0a0" font-size="11" text-anchor="end">3 items</text>

  <!-- Controls -->
  <rect x="660" y="200" width="395" height="160" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="680" y="228" fill="#eaeaea" font-size="15" font-weight="bold">Controls</text>

  <rect x="680" y="245" width="100" height="34" rx="4" fill="#4ecdc4"/>
  <text x="695" y="267" fill="#1a1a2e" font-size="12" font-weight="bold">Split</text>

  <rect x="790" y="245" width="100" height="34" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="815" y="267" fill="#eaeaea" font-size="12">Pause</text>

  <rect x="900" y="245" width="130" height="34" rx="4" fill="#e94560"/>
  <text x="920" y="267" fill="white" font-size="12">End Session</text>

  <rect x="680" y="295" width="130" height="34" rx="4" fill="none" stroke="#4ecdc4"/>
  <text x="698" y="317" fill="#4ecdc4" font-size="12">+ Log Item</text>

  <!-- Per-Player Breakdown -->
  <rect x="250" y="375" width="815" height="310" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="405" fill="#eaeaea" font-size="15" font-weight="bold">Per-Player Breakdown</text>

  <rect x="920" y="388" width="60" height="24" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="933" y="404" fill="#a0a0a0" font-size="10">Items</text>
  <rect x="985" y="388" width="70" height="24" rx="4" fill="#e94560"/>
  <text x="993" y="404" fill="white" font-size="10">Per Player</text>

  <!-- MFSorc -->
  <text x="270" y="440" fill="#eaeaea" font-size="13" font-weight="bold">MFSorc (8 items)</text>
  <line x1="270" y1="448" x2="1040" y2="448" stroke="#2a2a4a" stroke-width="0.5"/>
  <rect x="280" y="455" width="8" height="8" rx="2" fill="#ffd700"/>
  <text x="295" y="464" fill="#eaeaea" font-size="11">Shako</text>
  <text x="480" y="464" fill="#ffd700" font-size="11">Unique</text>
  <rect x="280" y="478" width="8" height="8" rx="2" fill="#00ff00"/>
  <text x="295" y="487" fill="#eaeaea" font-size="11">Vipermagi</text>
  <text x="480" y="487" fill="#00ff00" font-size="11">Set</text>
  <rect x="280" y="501" width="8" height="8" rx="2" fill="#ffd700"/>
  <text x="295" y="510" fill="#eaeaea" font-size="11">War Traveler</text>
  <text x="480" y="510" fill="#ffd700" font-size="11">Unique</text>

  <!-- HammerBro -->
  <text x="270" y="545" fill="#eaeaea" font-size="13" font-weight="bold">HammerBro (6 items)</text>
  <line x1="270" y1="553" x2="1040" y2="553" stroke="#2a2a4a" stroke-width="0.5"/>
  <rect x="280" y="560" width="8" height="8" rx="2" fill="#ffd700"/>
  <text x="295" y="569" fill="#eaeaea" font-size="11">Herald of Zakarum</text>
  <text x="480" y="569" fill="#ffd700" font-size="11">Unique</text>
  <rect x="280" y="583" width="8" height="8" rx="2" fill="#8888ff"/>
  <text x="295" y="592" fill="#eaeaea" font-size="11">Ber Rune</text>
  <text x="480" y="592" fill="#8888ff" font-size="11">Rare</text>

  <!-- JavaZon99 -->
  <text x="270" y="625" fill="#eaeaea" font-size="13" font-weight="bold">JavaZon99 (3 items)</text>
  <line x1="270" y1="633" x2="1040" y2="633" stroke="#2a2a4a" stroke-width="0.5"/>
  <rect x="280" y="640" width="8" height="8" rx="2" fill="#ffd700"/>
  <text x="295" y="649" fill="#eaeaea" font-size="11">Titan's Revenge</text>
  <text x="480" y="649" fill="#ffd700" font-size="11">Unique</text>
  <rect x="280" y="663" width="8" height="8" rx="2" fill="#00ff00"/>
  <text x="295" y="672" fill="#eaeaea" font-size="11">Razortail</text>
  <text x="480" y="672" fill="#00ff00" font-size="11">Set</text>
</svg>
