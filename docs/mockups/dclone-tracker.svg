  <rect x="270" y="555" width="350" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="280" y="574" fill="#666" font-size="11">+1 Skills / +10-20 Attr / +10-20 Res / 5-10% XP</text>
  
  <text x="635" y="550" fill="#a0a0a0" font-size="11">Notes</text>
  <rect x="635" y="555" width="250" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="645" y="574" fill="#666" font-size="11">Optional notes...</text>
  
  <rect x="900" y="555" width="130" height="28" rx="4" fill="#e94560"/>
  <text x="925" y="574" fill="white" font-size="12">Log Anni</text>
  
  <!-- Anni table header -->
  <text x="270" y="610" fill="#a0a0a0" font-size="11">Date</text>
  <text x="400" y="610" fill="#a0a0a0" font-size="11">Stats</text>
  <text x="750" y="610" fill="#a0a0a0" font-size="11">Notes</text>
  <line x1="270" y1="618" x2="1040" y2="618" stroke="#2a2a4a" stroke-width="1"/>
  
  <!-- Row 1 -->
  <text x="270" y="640" fill="#eaeaea" font-size="11">12/10/2024</text>
  <text x="400" y="640" fill="#eaeaea" font-size="11">+1 Skills / +18 Attr / +15 Res / 8% XP</text>
  <text x="750" y="640" fill="#a0a0a0" font-size="11">Decent roll</text>
  
  <!-- Row 2 -->
  <text x="270" y="665" fill="#eaeaea" font-size="11">11/28/2024</text>
  <text x="400" y="665" fill="#eaeaea" font-size="11">+1 Skills / +20 Attr / +19 Res / 10% XP</text>
  <text x="750" y="665" fill="#4ecdc4" font-size="11">Near perfect!</text>
