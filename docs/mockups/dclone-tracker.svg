  <text x="20" y="640" fill="#eaeaea" font-size="12" opacity="0.8">📂 Import Data</text>
  
  <!-- Main content -->
  <!-- Header -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">😈 DClone Tracker</text>
  <rect x="480" y="28" width="160" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="495" y="47" fill="#eaeaea" font-size="12">MFSorc - Sorceress</text>
  
  <!-- Region Progress Section -->
  <text x="250" y="90" fill="#eaeaea" font-size="15" font-weight="bold">Region Progress</text>
  <text x="250" y="110" fill="#a0a0a0" font-size="11">Track Diablo Clone progress per region. Update manually from community reports.</text>
  
  <!-- Americas: 3/6 -->
  <rect x="250" y="125" width="815" height="80" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="152" fill="#eaeaea" font-size="14" font-weight="bold">Americas</text>
  <text x="920" y="152" fill="#ffd700" font-size="12">3/6 — Agitated</text>
  <!-- Progress bar background -->
  <rect x="270" y="162" width="775" height="12" rx="6" fill="#1a1a2e"/>
  <!-- Progress bar fill (3/6 = 40% of 5 steps = 2/5 = 40%) -->
  <rect x="270" y="162" width="310" height="12" rx="6" fill="#ffd700"/>
  <!-- Level buttons -->
  <rect x="270" y="180" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="280" y="194" fill="#a0a0a0" font-size="10">1</text>
  <rect x="305" y="180" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
