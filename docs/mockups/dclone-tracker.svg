  <text x="20" y="375" fill="#eaeaea" font-size="14" opacity="0.4">🏛️ Ancients</text>
  <!-- DClone highlighted -->
  <rect x="0" y="390" width="220" height="40" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="390" width="3" height="40" fill="#e94560"/>
  <text x="20" y="415" fill="#eaeaea" font-size="14">😈 DClone</text>
  <text x="20" y="455" fill="#eaeaea" font-size="14" opacity="0.4">📈 XP Tracker</text>
  <text x="20" y="495" fill="#eaeaea" font-size="14" opacity="0.4">🤝 Co-op</text>
  <text x="20" y="535" fill="#eaeaea" font-size="14" opacity="0.4">⚙️ Settings</text>
  
  <!-- Data actions -->
