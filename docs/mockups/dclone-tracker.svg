  <rect x="340" y="180" width="30" height="20" rx="3" fill="#e94560"/>
  <text x="350" y="194" fill="white" font-size="10">3</text>
  <rect x="375" y="180" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="385" y="194" fill="#a0a0a0" font-size="10">4</text>
  <rect x="410" y="180" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="420" y="194" fill="#a0a0a0" font-size="10">5</text>
  <rect x="445" y="180" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="455" y="194" fill="#a0a0a0" font-size="10">6</text>
  
  <!-- Europe: 5/6 -->
  <rect x="250" y="215" width="815" height="80" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="242" fill="#eaeaea" font-size="14" font-weight="bold">Europe</text>
  <text x="920" y="242" fill="#e94560" font-size="12">5/6 — Terrorizing</text>
  <!-- Progress bar background -->
  <rect x="270" y="252" width="775" height="12" rx="6" fill="#1a1a2e"/>
  <!-- Progress bar fill (5/6 = 80%) -->
  <rect x="270" y="252" width="620" height="12" rx="6" fill="#e94560"/>
  <!-- Level buttons -->
  <rect x="270" y="270" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="280" y="284" fill="#a0a0a0" font-size="10">1</text>
  <rect x="305" y="270" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="315" y="284" fill="#a0a0a0" font-size="10">2</text>
  <rect x="340" y="270" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="350" y="284" fill="#a0a0a0" font-size="10">3</text>
  <rect x="375" y="270" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="385" y="284" fill="#a0a0a0" font-size="10">4</text>
  <rect x="410" y="270" width="30" height="20" rx="3" fill="#e94560"/>
  <text x="420" y="284" fill="white" font-size="10">5</text>
  <rect x="445" y="270" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="455" y="284" fill="#a0a0a0" font-size="10">6</text>
  
  <!-- Asia: 1/6 -->
  <rect x="250" y="305" width="815" height="80" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="332" fill="#eaeaea" font-size="14" font-weight="bold">Asia</text>
  <text x="920" y="332" fill="#4ecdc4" font-size="12">1/6 — Calm</text>
  <!-- Progress bar background -->
  <rect x="270" y="342" width="775" height="12" rx="6" fill="#1a1a2e"/>
  <!-- Progress bar fill (1/6 = 0% since level 1 is baseline) -->
  <rect x="270" y="342" width="0" height="12" rx="6" fill="#4ecdc4"/>
  <!-- Level buttons -->
  <rect x="270" y="360" width="30" height="20" rx="3" fill="#e94560"/>
  <text x="280" y="374" fill="white" font-size="10">1</text>
  <rect x="305" y="360" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="315" y="374" fill="#a0a0a0" font-size="10">2</text>
  <rect x="340" y="360" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="350" y="374" fill="#a0a0a0" font-size="10">3</text>
  <rect x="375" y="360" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="385" y="374" fill="#a0a0a0" font-size="10">4</text>
  <rect x="410" y="360" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="420" y="374" fill="#a0a0a0" font-size="10">5</text>
  <rect x="445" y="360" width="30" height="20" rx="3" fill="none" stroke="#2a2a4a"/>
  <text x="455" y="374" fill="#a0a0a0" font-size="10">6</text>
  
  <!-- Notification Settings -->
  <rect x="250" y="400" width="815" height="80" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="427" fill="#eaeaea" font-size="15" font-weight="bold">Notification Settings</text>
  
  <text x="270" y="455" fill="#a0a0a0" font-size="11">Preferred Region</text>
  <rect x="270" y="460" width="150" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="280" y="479" fill="#eaeaea" font-size="12">Americas</text>
  
  <text x="440" y="455" fill="#a0a0a0" font-size="11">Notify at Progress</text>
  <rect x="440" y="460" width="180" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="450" y="479" fill="#eaeaea" font-size="12">5 — Terrorizing</text>
  
  <!-- Anni Log Section -->
  <rect x="250" y="495" width="815" height="190" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="525" fill="#eaeaea" font-size="15" font-weight="bold">Annihilus Log</text>
  
  <!-- Anni form -->
