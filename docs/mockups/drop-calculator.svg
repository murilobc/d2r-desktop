<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Nav Items -->
  <text x="20" y="85" fill="#eaeaea" font-size="13" opacity="0.6">◎ Profiles</text>
  <text x="20" y="115" fill="#eaeaea" font-size="13" opacity="0.6">▶ Run Tracker</text>
  <text x="20" y="145" fill="#eaeaea" font-size="13" opacity="0.6">↗ Routes</text>
  <text x="20" y="175" fill="#eaeaea" font-size="13" opacity="0.6">☰ History</text>
  <text x="20" y="205" fill="#eaeaea" font-size="13" opacity="0.6">◈ Statistics</text>
  <text x="20" y="235" fill="#eaeaea" font-size="13" opacity="0.6">⇄ Compare</text>
  <text x="20" y="265" fill="#eaeaea" font-size="13" opacity="0.6">◆ Heralds</text>
  <text x="20" y="295" fill="#eaeaea" font-size="13" opacity="0.6">▣ Ancients</text>
  <text x="20" y="325" fill="#eaeaea" font-size="13" opacity="0.6">※ DClone</text>
  <text x="20" y="355" fill="#eaeaea" font-size="13" opacity="0.6">△ XP</text>
  <rect x="0" y="370" width="220" height="30" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="370" width="3" height="30" fill="#e94560"/>
  <text x="20" y="388" fill="#eaeaea" font-size="13">∿ Drops</text>
  <text x="20" y="418" fill="#eaeaea" font-size="13" opacity="0.6">⇌ Co-op</text>
  <text x="20" y="448" fill="#eaeaea" font-size="13" opacity="0.6">🏆 Achievements</text>
  <text x="20" y="478" fill="#eaeaea" font-size="13" opacity="0.6">ᚱ Runes</text>
  <text x="20" y="508" fill="#eaeaea" font-size="13" opacity="0.6">✦ Advisor</text>

  <!-- Separator -->
  <line x1="10" y1="528" x2="210" y2="528" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="553" fill="#eaeaea" font-size="13" opacity="0.6">⚙ Settings</text>
  <text x="20" y="583" fill="#eaeaea" font-size="13" opacity="0.6">◳ Overlay</text>
  <text x="20" y="613" fill="#eaeaea" font-size="13" opacity="0.6">● Theme</text>
  <text x="20" y="643" fill="#eaeaea" font-size="13" opacity="0.6">↓ Export</text>
  <text x="20" y="673" fill="#eaeaea" font-size="13" opacity="0.6">↑ Import</text>

  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Drop Calculator</text>

  <!-- Tab buttons -->
  <rect x="550" y="28" width="70" height="28" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="567" y="47" fill="#eaeaea" font-size="11">Areas</text>
  <rect x="625" y="28" width="95" height="28" rx="4" fill="#e94560"/>
  <text x="641" y="47" fill="white" font-size="11">Probability</text>
  <rect x="725" y="28" width="95" height="28" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="738" y="47" fill="#eaeaea" font-size="11">Comparison</text>

  <!-- Configuration Panel -->
  <rect x="250" y="70" width="820" height="120" rx="8" fill="#16213e" stroke="#2a2a4a"/>

  <!-- Row 1: Monster & Item -->
  <text x="270" y="95" fill="#a0a0a0" font-size="10">Monster</text>
  <rect x="270" y="100" width="200" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="283" y="118" fill="#eaeaea" font-size="11">Mephisto (Act 3)</text>

  <text x="490" y="95" fill="#a0a0a0" font-size="10">Target Item</text>
  <rect x="490" y="100" width="200" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="503" y="118" fill="#c4a000" font-size="11">Harlequin Crest (Unique)</text>

  <text x="710" y="95" fill="#a0a0a0" font-size="10">Magic Find %</text>
  <rect x="710" y="100" width="80" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="738" y="118" fill="#4ecdc4" font-size="11" font-weight="bold">300</text>

  <text x="810" y="95" fill="#a0a0a0" font-size="10">Players</text>
  <rect x="810" y="100" width="60" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="835" y="118" fill="#eaeaea" font-size="11">3</text>

  <!-- Row 2: Checkboxes -->
  <rect x="270" y="140" width="14" height="14" rx="2" fill="#0f3460" stroke="#4ecdc4"/>
  <text x="265" y="150" fill="#4ecdc4" font-size="10">✓</text>
  <text x="290" y="152" fill="#eaeaea" font-size="10">Quest Bonus</text>

  <rect x="400" y="140" width="14" height="14" rx="2" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="420" y="152" fill="#eaeaea" font-size="10">Terror Zone</text>

  <text x="530" y="152" fill="#a0a0a0" font-size="10">Herald Tier:</text>
  <rect x="600" y="138" width="80" height="22" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="620" y="153" fill="#eaeaea" font-size="10">None</text>

  <!-- Results Section -->
  <rect x="250" y="205" width="400" height="140" rx="8" fill="rgba(78,205,196,0.08)" stroke="rgba(78,205,196,0.3)"/>
  <text x="270" y="232" fill="#a0a0a0" font-size="11">Drop Chance</text>
  <text x="270" y="268" fill="#4ecdc4" font-size="28" font-weight="bold">1 in 1,032</text>

  <text x="270" y="300" fill="#a0a0a0" font-size="10">Kills needed for confidence:</text>
  <text x="270" y="318" fill="#eaeaea" font-size="11">50%: <tspan fill="#4ecdc4">715</tspan>   63%: <tspan fill="#4ecdc4">1,032</tspan>   90%: <tspan fill="#4ecdc4">2,377</tspan>   99%: <tspan fill="#4ecdc4">4,750</tspan></text>

  <text x="270" y="338" fill="#a0a0a0" font-size="10">Effective MF: 198.7% (diminishing returns applied)</text>

  <!-- Run Estimate Section -->
  <rect x="670" y="205" width="400" height="140" rx="8" fill="rgba(233,69,96,0.08)" stroke="rgba(233,69,96,0.3)"/>
  <text x="690" y="232" fill="#a0a0a0" font-size="11">Based On Your Farming Data</text>
  <text x="690" y="262" fill="#eaeaea" font-size="11">Avg run time (Mephisto): <tspan fill="#4ecdc4" font-weight="bold">1:15</tspan></text>
  <text x="690" y="285" fill="#eaeaea" font-size="11">Runs for 50% chance: <tspan fill="#e94560" font-weight="bold">~715</tspan></text>
  <text x="690" y="308" fill="#eaeaea" font-size="11">Estimated time: <tspan fill="#e94560" font-weight="bold">~14h 53m</tspan></text>
  <text x="690" y="331" fill="#a0a0a0" font-size="10">Actual drops (312 runs): 0 found · Expected: ~0.3</text>

  <!-- Distribution Chart -->
  <text x="250" y="370" fill="#a0a0a0" font-size="13" font-weight="500">Probability Distribution</text>
  <rect x="250" y="380" width="820" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>

  <!-- Chart axes -->
  <line x1="300" y1="410" x2="300" y2="555" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="300" y1="555" x2="1040" y2="555" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="270" y="420" fill="#a0a0a0" font-size="9">100%</text>
  <text x="275" y="460" fill="#a0a0a0" font-size="9">75%</text>
  <text x="275" y="500" fill="#a0a0a0" font-size="9">50%</text>
  <text x="275" y="540" fill="#a0a0a0" font-size="9">25%</text>

  <!-- X axis labels -->
  <text x="300" y="570" fill="#a0a0a0" font-size="9">0</text>
  <text x="470" y="570" fill="#a0a0a0" font-size="9">1000</text>
  <text x="640" y="570" fill="#a0a0a0" font-size="9">2000</text>
  <text x="810" y="570" fill="#a0a0a0" font-size="9">3000</text>
  <text x="980" y="570" fill="#a0a0a0" font-size="9">4000</text>
  <text x="620" y="585" fill="#a0a0a0" font-size="9">Kills</text>

  <!-- CDF curve (probability reaches ~100% asymptotically) -->
  <path d="M300,555 C400,530 500,480 600,450 C700,430 800,418 900,413 C950,411 1000,410 1040,410" fill="none" stroke="#4ecdc4" stroke-width="2"/>

  <!-- 50% line -->
  <line x1="300" y1="500" x2="1040" y2="500" stroke="#e94560" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="1045" y="503" fill="#e94560" font-size="8">50%</text>

  <!-- Marker at 715 kills -->
  <circle cx="420" cy="500" r="4" fill="#e94560"/>
  <line x1="420" y1="500" x2="420" y2="555" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="405" y="565" fill="#e94560" font-size="8">715</text>

  <!-- Active profile footer -->
  <rect x="0" y="680" width="220" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="20" y="694" fill="#a0a0a0" font-size="9">▸ MFSorc · Sorceress</text>
</svg>
