<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="95" fill="#eaeaea" font-size="14">👤 Profiles</text>
  <text x="20" y="135" fill="#eaeaea" font-size="14">🎮 Run Tracker</text>
  <text x="20" y="175" fill="#eaeaea" font-size="14">📜 History</text>
  <text x="20" y="215" fill="#eaeaea" font-size="14">📊 Statistics</text>
  <rect x="0" y="230" width="220" height="40" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="230" width="3" height="40" fill="#e94560"/>
  <text x="20" y="255" fill="#eaeaea" font-size="14">🎲 Drop Calculator</text>
  
  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Drop Calculator</text>
  
  <!-- Filter buttons -->
  <rect x="780" y="28" width="50" height="28" rx="4" fill="#e94560"/>
  <text x="793" y="47" fill="white" font-size="11">All</text>
  <rect x="840" y="28" width="65" height="28" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="852" y="47" fill="#eaeaea" font-size="11">TC85+</text>
  <rect x="915" y="28" width="70" height="28" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="927" y="47" fill="#eaeaea" font-size="11">Bosses</text>
  
  <!-- Area list (left panel) -->
  <rect x="250" y="75" width="260" height="45" rx="6" fill="rgba(233,69,96,0.1)" stroke="#e94560"/>
  <text x="265" y="95" fill="#eaeaea" font-size="12" font-weight="500">Ancient Tunnels</text>
  <text x="265" y="112" fill="#a0a0a0" font-size="10">Act 2 • alvl 85 <tspan fill="#4ecdc4" font-weight="bold">TC85+</tspan></text>
  
  <rect x="250" y="125" width="260" height="45" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="265" y="145" fill="#eaeaea" font-size="12" font-weight="500">Pit</text>
  <text x="265" y="162" fill="#a0a0a0" font-size="10">Act 1 • alvl 85 <tspan fill="#4ecdc4" font-weight="bold">TC85+</tspan></text>
  
  <rect x="250" y="175" width="260" height="45" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="265" y="195" fill="#eaeaea" font-size="12" font-weight="500">Chaos Sanctuary</text>
  <text x="265" y="212" fill="#a0a0a0" font-size="10">Act 4 • alvl 85 <tspan fill="#4ecdc4" font-weight="bold">TC85+</tspan></text>
  
  <rect x="250" y="225" width="260" height="45" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="265" y="245" fill="#eaeaea" font-size="12" font-weight="500">Mephisto</text>
  <text x="265" y="262" fill="#a0a0a0" font-size="10">Act 3 • alvl 87</text>
  
  <rect x="250" y="275" width="260" height="45" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="265" y="295" fill="#eaeaea" font-size="12" font-weight="500">Travincal</text>
  <text x="265" y="312" fill="#a0a0a0" font-size="10">Act 3 • alvl 83</text>
  
  <!-- Detail panel (right) -->
  <text x="540" y="95" fill="#eaeaea" font-size="18" font-weight="bold">Ancient Tunnels</text>
  <rect x="720" y="78" width="120" height="22" rx="4" fill="rgba(78,205,196,0.2)"/>
  <text x="735" y="93" fill="#4ecdc4" font-size="11" font-weight="bold">Can drop ALL items</text>
  
  <!-- Info cards -->
  <rect x="540" y="115" width="100" height="55" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="565" y="135" fill="#a0a0a0" font-size="9">Area Level</text>
  <text x="575" y="158" fill="#e94560" font-size="18" font-weight="bold">85</text>
  
  <rect x="650" y="115" width="100" height="55" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="665" y="135" fill="#a0a0a0" font-size="9">Treasure Class</text>
  <text x="674" y="158" fill="#e94560" font-size="16" font-weight="bold">TC87</text>
  
  <rect x="760" y="115" width="100" height="55" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="799" y="135" fill="#a0a0a0" font-size="9">Act</text>
  <text x="803" y="158" fill="#e94560" font-size="18" font-weight="bold">2</text>
  
  <!-- Monster Types -->
  <text x="540" y="200" fill="#a0a0a0" font-size="12">Monster Types</text>
  <rect x="540" y="210" width="70" height="24" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="552" y="226" fill="#eaeaea" font-size="10">Undead</text>
  <rect x="618" y="210" width="65" height="24" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="632" y="226" fill="#eaeaea" font-size="10">Demon</text>
  
  <!-- Notable Drops -->
  <text x="540" y="265" fill="#a0a0a0" font-size="12">Notable Drops</text>
  <rect x="540" y="275" width="460" height="26" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="550" y="293" fill="#c4a000" font-size="11">Tyrael's Might</text>
  <rect x="540" y="305" width="460" height="26" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="550" y="323" fill="#c4a000" font-size="11">Arachnid Mesh</text>
  <rect x="540" y="335" width="460" height="26" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="550" y="353" fill="#c4a000" font-size="11">Death's Web</text>
  <rect x="540" y="365" width="460" height="26" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="550" y="383" fill="#c4a000" font-size="11">Death's Fathom</text>
  <rect x="540" y="395" width="460" height="26" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="550" y="413" fill="#c4a000" font-size="11">Griffon's Eye</text>
  
  <!-- Tips -->
  <rect x="540" y="440" width="460" height="60" rx="6" fill="#16213e" stroke="#2a2a4a"/>
  <text x="555" y="460" fill="#a0a0a0" font-size="11">Tips</text>
  <text x="555" y="480" fill="#a0a0a0" font-size="11">No cold immunes. Best area for Blizzard Sorceress.</text>
</svg>
