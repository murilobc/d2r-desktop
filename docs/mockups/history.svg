<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="95" fill="#eaeaea" font-size="14">👤 Profiles</text>
  <text x="20" y="135" fill="#eaeaea" font-size="14">🎮 Run Tracker</text>
  <text x="20" y="175" fill="#eaeaea" font-size="14">🗺️ Routes</text>
  <rect x="0" y="190" width="220" height="40" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="190" width="3" height="40" fill="#e94560"/>
  <text x="20" y="215" fill="#eaeaea" font-size="14">📜 History</text>
  <text x="20" y="255" fill="#eaeaea" font-size="14">📊 Statistics</text>
  <text x="20" y="295" fill="#eaeaea" font-size="14">⚔️ Compare</text>
  <text x="20" y="335" fill="#eaeaea" font-size="14">🎲 Drop Calculator</text>
  <text x="20" y="375" fill="#eaeaea" font-size="14">⚙️ Settings</text>
  
  <!-- Active profile -->
  <line x1="0" y1="630" x2="220" y2="630" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="655" fill="#a0a0a0" font-size="10">Active profile:</text>
  <text x="20" y="672" fill="#eaeaea" font-size="13" font-weight="bold">MFSorc</text>
  <text x="20" y="690" fill="#a0a0a0" font-size="11">Sorceress</text>
  
  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">History</text>
  
  <!-- Tier filter dropdown -->
  <text x="620" y="47" fill="#a0a0a0" font-size="11">Filter by tier:</text>
  <rect x="710" y="30" width="120" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="725" y="49" fill="#eaeaea" font-size="11">All tiers</text>
  <text x="808" y="49" fill="#a0a0a0" font-size="11">▼</text>
  
  <rect x="860" y="30" width="180" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="878" y="49" fill="#eaeaea" font-size="11">MFSorc - 147 runs</text>
  
  <!-- Run 1 (expanded, has items with tier badges) -->
  <rect x="250" y="80" width="810" height="190" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <!-- Header -->
  <text x="270" y="108" fill="#eaeaea" font-size="14" font-weight="500">Mephisto <tspan fill="#e94560" font-weight="bold">#47</tspan></text>
  <text x="470" y="108" fill="#4ecdc4" font-family="monospace" font-size="13">00:01:52</text>
  <text x="600" y="108" fill="#a0a0a0" font-size="12">6/21/2026 2:32 PM</text>
  <text x="950" y="108" fill="#a0a0a0" font-size="11">▼</text>
  
  <!-- Expanded details -->
  <line x1="270" y1="120" x2="1040" y2="120" stroke="#2a2a4a" stroke-width="1"/>
  <text x="280" y="140" fill="#a0a0a0" font-size="11">Area:</text>
  <text x="315" y="140" fill="#eaeaea" font-size="11">Mephisto ✎</text>
  
  <text x="280" y="165" fill="#eaeaea" font-size="12" font-weight="500">Items (2)</text>
  <text x="600" y="165" fill="#4ecdc4" font-size="11">+ Add Item</text>
  
  <!-- Item 1 with High tier badge -->
  <rect x="280" y="175" width="740" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="290" y="195" fill="#c4a000" font-size="11" font-weight="500">Harlequin Crest</text>
  <rect x="400" y="183" width="40" height="18" rx="3" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
  <text x="408" y="196" fill="#a855f7" font-size="9" font-weight="bold">High</text>
  <text x="550" y="195" fill="#a0a0a0" font-size="10">Armor</text>
  <text x="650" y="195" fill="#c4a000" font-size="10" font-weight="bold">Unique</text>
  <text x="1000" y="195" fill="#e94560" font-size="11">✕</text>
  
  <!-- Item 2 with Mid tier badge -->
  <rect x="280" y="210" width="740" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="290" y="230" fill="#6060ff" font-size="11" font-weight="500">Jewel -5/+5 Cold Facet (Die)</text>
  <rect x="475" y="218" width="34" height="18" rx="3" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="482" y="231" fill="#3b82f6" font-size="9" font-weight="bold">Mid</text>
  <text x="550" y="230" fill="#a0a0a0" font-size="10">Jewel</text>
  <text x="650" y="230" fill="#6060ff" font-size="10" font-weight="bold">Jewel</text>
  <text x="1000" y="230" fill="#e94560" font-size="11">✕</text>
  
  <!-- Delete button -->
  <rect x="960" y="248" width="55" height="18" rx="3" fill="none" stroke="#e94560"/>
  <text x="970" y="261" fill="#e94560" font-size="9">Delete</text>
  
  <!-- Run 2 (collapsed, no items) -->
  <rect x="250" y="285" width="810" height="45" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="313" fill="#eaeaea" font-size="14" font-weight="500">Mephisto <tspan fill="#e94560" font-weight="bold">#46</tspan></text>
  <text x="470" y="313" fill="#4ecdc4" font-family="monospace" font-size="13">00:02:05</text>
  <text x="600" y="313" fill="#a0a0a0" font-size="12">6/21/2026 2:30 PM</text>
  <text x="950" y="313" fill="#a0a0a0" font-size="11">▶</text>
  
  <!-- Run 3 (expanded, has items with tier badges) -->
  <rect x="250" y="345" width="810" height="160" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="373" fill="#eaeaea" font-size="14" font-weight="500">Ancient Tunnels <tspan fill="#e94560" font-weight="bold">#12</tspan></text>
  <text x="470" y="373" fill="#4ecdc4" font-family="monospace" font-size="13">00:03:41</text>
  <text x="600" y="373" fill="#a0a0a0" font-size="12">6/21/2026 2:25 PM</text>
  <text x="950" y="373" fill="#a0a0a0" font-size="11">▼</text>
  
  <line x1="270" y1="385" x2="1040" y2="385" stroke="#2a2a4a" stroke-width="1"/>
  <text x="280" y="405" fill="#a0a0a0" font-size="11">Area:</text>
  <text x="315" y="405" fill="#eaeaea" font-size="11">Ancient Tunnels ✎</text>
  
  <text x="280" y="430" fill="#eaeaea" font-size="12" font-weight="500">Items (1)</text>
  <text x="600" y="430" fill="#4ecdc4" font-size="11">+ Add Item</text>
  
  <!-- Item with Mid tier badge -->
  <rect x="280" y="440" width="740" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="290" y="460" fill="#00c400" font-size="11" font-weight="500">Tal Rasha's Guardianship</text>
  <rect x="448" y="448" width="34" height="18" rx="3" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="455" y="461" fill="#3b82f6" font-size="9" font-weight="bold">Mid</text>
  <text x="550" y="460" fill="#a0a0a0" font-size="10">Set Item</text>
  <text x="650" y="460" fill="#00c400" font-size="10" font-weight="bold">Set</text>
  <text x="1000" y="460" fill="#e94560" font-size="11">✕</text>
  
  <!-- Run 4 (collapsed) -->
  <rect x="250" y="520" width="810" height="45" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="548" fill="#eaeaea" font-size="14" font-weight="500">Chaos Sanctuary <tspan fill="#e94560" font-weight="bold">#8</tspan></text>
  <text x="470" y="548" fill="#4ecdc4" font-family="monospace" font-size="13">00:04:12</text>
  <text x="600" y="548" fill="#a0a0a0" font-size="12">6/21/2026 2:20 PM</text>
  <text x="950" y="548" fill="#a0a0a0" font-size="11">▶</text>
  
  <!-- Run 5 (collapsed) -->
  <rect x="250" y="580" width="810" height="45" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="608" fill="#eaeaea" font-size="14" font-weight="500">Mephisto <tspan fill="#e94560" font-weight="bold">#45</tspan></text>
  <text x="470" y="608" fill="#4ecdc4" font-family="monospace" font-size="13">00:01:58</text>
  <text x="600" y="608" fill="#a0a0a0" font-size="12">6/21/2026 2:15 PM</text>
  <text x="950" y="608" fill="#a0a0a0" font-size="11">▶</text>
  
  <!-- Load more -->
  <rect x="550" y="640" width="120" height="28" rx="4" fill="none" stroke="#2a2a4a"/>
  <text x="575" y="659" fill="#a0a0a0" font-size="11">Load More...</text>
</svg>
