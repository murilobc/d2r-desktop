<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Nav Items -->
  <text x="20" y="85" fill="#eaeaea" font-size="13" opacity="0.6">◎ Profiles</text>
  <text x="20" y="115" fill="#eaeaea" font-size="13" opacity="0.6">▶ Run Tracker</text>
  <text x="20" y="145" fill="#eaeaea" font-size="13" opacity="0.6">↗ Routes</text>
  <text x="20" y="175" fill="#eaeaea" font-size="13" opacity="0.6">☰ History</text>
  <text x="20" y="205" fill="#eaeaea" font-size="13" opacity="0.6">◈ Statistics</text>
  <text x="20" y="235" fill="#eaeaea" font-size="13" opacity="0.6">⇄ Compare</text>
  <text x="20" y="265" fill="#eaeaea" font-size="13" opacity="0.6">◆ Heralds</text>
  <text x="20" y="295" fill="#eaeaea" font-size="13" opacity="0.6">▣ Ancients</text>
  <text x="20" y="325" fill="#eaeaea" font-size="13" opacity="0.6">※ DClone</text>
  <text x="20" y="355" fill="#eaeaea" font-size="13" opacity="0.6">△ XP</text>
  <text x="20" y="385" fill="#eaeaea" font-size="13" opacity="0.6">∿ Drops</text>
  <text x="20" y="415" fill="#eaeaea" font-size="13" opacity="0.6">⇌ Co-op</text>

  <!-- Separator -->
  <line x1="10" y1="440" x2="210" y2="440" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Bottom Nav -->
  <text x="20" y="465" fill="#eaeaea" font-size="13" opacity="0.6">⚙ Settings</text>
  <rect x="0" y="480" width="220" height="30" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="480" width="3" height="30" fill="#e94560"/>
  <text x="20" y="495" fill="#eaeaea" font-size="13">◳ Overlay</text>
  <text x="20" y="525" fill="#eaeaea" font-size="13" opacity="0.6">● Theme</text>
  <text x="20" y="555" fill="#eaeaea" font-size="13" opacity="0.6">↓ Export</text>
  <text x="20" y="585" fill="#eaeaea" font-size="13" opacity="0.6">↑ Import</text>

  <!-- Main content: Overlay preview -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Overlay Preview</text>
  <text x="250" y="75" fill="#a0a0a0" font-size="12">Compact overlay window shown on top of D2R</text>

  <!-- Overlay window mock -->
  <rect x="350" y="120" width="420" height="320" rx="8" fill="rgba(0,0,0,0.85)" stroke="rgba(233,69,96,0.6)" stroke-width="2"/>

  <!-- Header row -->
  <circle cx="375" cy="148" r="5" fill="#ff0000"/>
  <text x="390" y="152" fill="#666" font-size="11">Session:</text>
  <text x="445" y="152" fill="#aaa" font-family="monospace" font-size="12">01:23:47.3</text>
  <text x="600" y="152" fill="#4ecdc4" font-size="11">Mephisto</text>
  <text x="740" y="152" fill="#666" font-size="16">×</text>

  <!-- Run timer -->
  <text x="560" y="230" fill="#ffffff" font-size="44" font-weight="bold" font-family="monospace" text-anchor="middle">00:02:34.7</text>

  <!-- Run count -->
  <text x="560" y="270" fill="#ff6600" font-size="14" font-family="monospace" text-anchor="middle">Run: 23 (147)</text>

  <!-- Control buttons -->
  <rect x="440" y="300" width="50" height="36" rx="4" fill="#4ecdc4"/>
  <text x="455" y="323" fill="#000" font-size="14">⏭</text>
  <rect x="500" y="300" width="50" height="36" rx="4" fill="#ffaa00"/>
  <text x="516" y="323" fill="#000" font-size="14">⏸</text>
  <rect x="560" y="300" width="50" height="36" rx="4" fill="#e94560"/>
  <text x="576" y="323" fill="#fff" font-size="14">⏹</text>
  <rect x="620" y="300" width="50" height="36" rx="4" fill="#333"/>
  <text x="638" y="323" fill="#4ecdc4" font-size="16" font-weight="bold">+</text>

  <!-- Item search -->
  <rect x="380" y="360" width="260" height="30" rx="4" fill="rgba(255,255,255,0.1)" stroke="#4ecdc4"/>
  <text x="395" y="380" fill="#aaa" font-size="11">Search D2R item...</text>
  <rect x="650" y="360" width="90" height="30" rx="4" fill="rgba(255,255,255,0.1)" stroke="#444"/>
  <text x="672" y="380" fill="#aaa" font-size="11">All</text>

  <!-- Dropdown hint -->
  <rect x="380" y="395" width="360" height="28" rx="3" fill="rgba(0,0,0,0.95)" stroke="#444"/>
  <text x="395" y="414" fill="#c4a000" font-size="11">Harlequin Crest</text>
  <text x="680" y="414" fill="#666" font-size="9">Unique</text>
</svg>
