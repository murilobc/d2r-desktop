<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background (transparent with dark glass) -->
  <rect width="320" height="240" rx="8" fill="rgba(0,0,0,0.85)" stroke="rgba(233,69,96,0.6)" stroke-width="1"/>
  
  <!-- Header row -->
  <circle cx="16" cy="18" r="4" fill="#ff0000"/>
  <text x="26" y="22" fill="#666" font-size="9">Session:</text>
  <text x="64" y="22" fill="#aaa" font-family="monospace" font-size="10">01:23:47.3</text>
  <text x="220" y="22" fill="#4ecdc4" font-size="9">Mephisto</text>
  <text x="300" y="22" fill="#666" font-size="14">×</text>
  
  <!-- Run timer (large, center) -->
  <text x="160" y="90" fill="#ffffff" font-size="36" font-weight="bold" font-family="monospace" text-anchor="middle">00:02:34.7</text>
  
  <!-- Run count -->
  <text x="160" y="120" fill="#ff6600" font-size="11" font-family="monospace" text-anchor="middle">Run: 23 (147)</text>
  
  <!-- Control buttons -->
  <rect x="62" y="140" width="36" height="26" rx="4" fill="#4ecdc4"/>
  <text x="72" y="157" fill="#000" font-size="12">⏭</text>
  <rect x="106" y="140" width="36" height="26" rx="4" fill="#ffaa00"/>
  <text x="117" y="157" fill="#000" font-size="12">⏸</text>
  <rect x="150" y="140" width="36" height="26" rx="4" fill="#e94560"/>
  <text x="161" y="157" fill="#fff" font-size="12">⏹</text>
  <rect x="194" y="140" width="36" height="26" rx="4" fill="#333"/>
  <text x="207" y="158" fill="#4ecdc4" font-size="14" font-weight="bold">+</text>
  
  <!-- Item search (shown) -->
  <rect x="14" y="180" width="200" height="24" rx="4" fill="rgba(255,255,255,0.1)" stroke="#4ecdc4"/>
  <text x="22" y="196" fill="#aaa" font-size="10">Search D2R item...</text>
  <rect x="220" y="180" width="70" height="24" rx="4" fill="rgba(255,255,255,0.1)" stroke="#444"/>
  <text x="232" y="196" fill="#aaa" font-size="9">All</text>
  
  <!-- Dropdown hint -->
  <rect x="14" y="206" width="276" height="22" rx="3" fill="rgba(0,0,0,0.95)" stroke="#444"/>
  <text x="22" y="221" fill="#c4a000" font-size="10">Harlequin Crest</text>
  <text x="230" y="221" fill="#666" font-size="8">Unique</text>
</svg>
