<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="95" fill="#eaeaea" font-size="14">👤 Profiles</text>
  <rect x="0" y="110" width="220" height="40" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="110" width="3" height="40" fill="#e94560"/>
  <text x="20" y="135" fill="#eaeaea" font-size="14">🎮 Run Tracker</text>
  <text x="20" y="175" fill="#eaeaea" font-size="14">📜 History</text>
  <text x="20" y="215" fill="#eaeaea" font-size="14">📊 Statistics</text>
  
  <!-- Active profile -->
  <line x1="0" y1="630" x2="220" y2="630" stroke="#2a2a4a" stroke-width="1"/>
  <text x="20" y="655" fill="#a0a0a0" font-size="10">Active profile:</text>
  <text x="20" y="672" fill="#eaeaea" font-size="13" font-weight="bold">MFSorc</text>
  <text x="20" y="690" fill="#a0a0a0" font-size="11">Sorceress</text>
  
  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Run Tracker</text>
  <rect x="880" y="28" width="160" height="28" rx="4" fill="#0f3460" stroke="#2a2a4a"/>
  <text x="892" y="47" fill="#eaeaea" font-size="11">MFSorc - Sorceress</text>
  
  <!-- Timer Panel (black bg) -->
  <rect x="250" y="75" width="810" height="280" rx="8" fill="#000"/>
  
  <!-- Session timer -->
  <circle cx="280" cy="105" r="6" fill="#ff0000"/>
  <text x="295" y="110" fill="#ccc" font-size="14" font-family="monospace">Session time: 01:23:47.3</text>
  
  <!-- Run timer (large) -->
  <text x="460" y="190" fill="#ffffff" font-size="52" font-weight="bold" font-family="monospace" text-anchor="middle">00:02:34.7</text>
  
  <!-- Run count -->
  <text x="460" y="240" fill="#aaa" font-size="15" font-family="monospace" text-anchor="middle">───── Run count: <tspan fill="#ff6600" font-size="20" font-weight="bold">23</tspan> <tspan fill="#ff6600">(147)</tspan> ─────</text>
  
  <!-- Fastest / Average -->
  <text x="460" y="280" fill="#999" font-size="13" font-family="monospace" text-anchor="middle">Fastest time: 00:01:42.0</text>
  <text x="460" y="305" fill="#999" font-size="13" font-family="monospace" text-anchor="middle">Average time: 00:02:18.0</text>
  
  <!-- Controls -->
  <rect x="320" y="375" width="140" height="38" rx="4" fill="#4ecdc4"/>
  <text x="347" y="399" fill="#000" font-size="13" font-weight="bold">⏭ Next Run</text>
  <rect x="480" y="375" width="120" height="38" rx="4" fill="#ffaa00"/>
  <text x="510" y="399" fill="#000" font-size="13" font-weight="bold">⏸ Pause</text>
  <rect x="620" y="375" width="160" height="38" rx="4" fill="none" stroke="#e94560"/>
  <text x="645" y="399" fill="#e94560" font-size="13">⏹ End Session</text>
  
  <!-- Area -->
  <text x="260" y="440" fill="#a0a0a0" font-size="12">Area:</text>
  <rect x="295" y="425" width="180" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="305" y="444" fill="#eaeaea" font-size="12">Mephisto</text>
  
  <!-- Items section -->
  <rect x="250" y="470" width="810" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="498" fill="#eaeaea" font-size="14" font-weight="bold">Items Found (3)</text>
  <rect x="920" y="480" width="70" height="26" rx="4" fill="none" stroke="#4ecdc4"/>
  <text x="935" y="497" fill="#4ecdc4" font-size="11">+ Item</text>
  
  <!-- Item rows -->
  <rect x="270" y="515" width="770" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="280" y="535" fill="#c4a000" font-size="12" font-weight="500">Shako (Harlequin Crest)</text>
  <text x="600" y="535" fill="#a0a0a0" font-size="11">Armor</text>
  <text x="700" y="535" fill="#c4a000" font-size="11" font-weight="bold">Unique</text>
  
  <rect x="270" y="550" width="770" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="280" y="570" fill="#ff8c00" font-size="12" font-weight="500">Ist Rune</text>
  <text x="600" y="570" fill="#a0a0a0" font-size="11">Rune</text>
  <text x="700" y="570" fill="#ff8c00" font-size="11" font-weight="bold">Rune</text>
  
  <rect x="270" y="585" width="770" height="30" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="280" y="605" fill="#00c400" font-size="12" font-weight="500">Tal Rasha's Adjudication</text>
  <text x="600" y="605" fill="#a0a0a0" font-size="11">Set Item</text>
  <text x="700" y="605" fill="#00c400" font-size="11" font-weight="bold">Set</text>
</svg>
