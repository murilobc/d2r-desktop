<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <rect width="1100" height="700" fill="#1a1a2e"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="700" fill="#0f3460"/>
  <text x="20" y="38" fill="#e94560" font-size="16" font-weight="bold">D2R Tracker</text>
  <line x1="0" y1="60" x2="220" y2="60" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Nav Items -->
  <text x="20" y="85" fill="#eaeaea" font-size="13" opacity="0.6">◎ Profiles</text>
  <text x="20" y="115" fill="#eaeaea" font-size="13" opacity="0.6">▶ Run Tracker</text>
  <text x="20" y="145" fill="#eaeaea" font-size="13" opacity="0.6">↗ Routes</text>
  <text x="20" y="175" fill="#eaeaea" font-size="13" opacity="0.6">☰ History</text>
  <rect x="0" y="190" width="220" height="30" fill="rgba(233,69,96,0.2)"/>
  <rect x="0" y="190" width="3" height="30" fill="#e94560"/>
  <text x="20" y="205" fill="#eaeaea" font-size="13">◈ Statistics</text>
  <text x="20" y="235" fill="#eaeaea" font-size="13" opacity="0.6">⇄ Compare</text>
  <text x="20" y="265" fill="#eaeaea" font-size="13" opacity="0.6">◆ Heralds</text>
  <text x="20" y="295" fill="#eaeaea" font-size="13" opacity="0.6">▣ Ancients</text>
  <text x="20" y="325" fill="#eaeaea" font-size="13" opacity="0.6">※ DClone</text>
  <text x="20" y="355" fill="#eaeaea" font-size="13" opacity="0.6">△ XP</text>
  <text x="20" y="385" fill="#eaeaea" font-size="13" opacity="0.6">∿ Drops</text>
  <text x="20" y="415" fill="#eaeaea" font-size="13" opacity="0.6">⇌ Co-op</text>

  <!-- Separator -->
  <line x1="10" y1="440" x2="210" y2="440" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Bottom Nav -->
  <text x="20" y="465" fill="#eaeaea" font-size="13" opacity="0.6">⚙ Settings</text>
  <text x="20" y="495" fill="#eaeaea" font-size="13" opacity="0.6">◳ Overlay</text>
  <text x="20" y="525" fill="#eaeaea" font-size="13" opacity="0.6">● Theme</text>
  <text x="20" y="555" fill="#eaeaea" font-size="13" opacity="0.6">↓ Export</text>
  <text x="20" y="585" fill="#eaeaea" font-size="13" opacity="0.6">↑ Import</text>

  <!-- Main content -->
  <text x="250" y="50" fill="#eaeaea" font-size="22" font-weight="bold">Statistics</text>

  <!-- Header actions -->
  <rect x="620" y="28" width="130" height="28" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="638" y="47" fill="#eaeaea" font-size="11">All areas</text>
  <rect x="765" y="28" width="150" height="28" rx="4" fill="#e94560"/>
  <text x="780" y="47" fill="white" font-size="11">Detailed Report</text>
  <rect x="930" y="28" width="120" height="28" rx="4" fill="#3498db"/>
  <text x="947" y="47" fill="white" font-size="11">Export PDF</text>

  <!-- Stat cards row -->
  <rect x="250" y="75" width="120" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="280" y="105" fill="#e94560" font-size="20" font-weight="bold">147</text>
  <text x="270" y="128" fill="#a0a0a0" font-size="10">Total Runs</text>

  <rect x="380" y="75" width="120" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="415" y="105" fill="#e94560" font-size="20" font-weight="bold">34</text>
  <text x="398" y="128" fill="#a0a0a0" font-size="10">Total Items</text>

  <rect x="510" y="75" width="120" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="525" y="105" fill="#e94560" font-size="16" font-weight="bold">5h 23m</text>
  <text x="538" y="128" fill="#a0a0a0" font-size="10">Total Time</text>

  <rect x="640" y="75" width="120" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="655" y="105" fill="#e94560" font-size="16" font-weight="bold">2m 12s</text>
  <text x="660" y="128" fill="#a0a0a0" font-size="10">Average Time</text>

  <rect x="770" y="75" width="120" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="790" y="105" fill="#e94560" font-size="16" font-weight="bold">1m 28s</text>
  <text x="808" y="128" fill="#a0a0a0" font-size="10">Fastest</text>

  <rect x="900" y="75" width="150" height="70" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="940" y="105" fill="#e94560" font-size="18" font-weight="bold">0.2</text>
  <text x="935" y="128" fill="#a0a0a0" font-size="10">Items/Run</text>

  <!-- Item Value Summary card -->
  <rect x="250" y="155" width="395" height="80" rx="8" fill="#16213e" stroke="#ffaa00"/>
  <text x="270" y="178" fill="#ffaa00" font-size="13" font-weight="bold">Item Value Summary</text>
  <text x="270" y="200" fill="#eaeaea" font-size="16" font-weight="bold">Total Value: 47 pts</text>
  <text x="270" y="222" fill="#a0a0a0" font-size="11">GG: 1 · High: 2 · Mid: 5 · Low: 3</text>

  <!-- Route Statistics card -->
  <rect x="665" y="155" width="395" height="80" rx="8" fill="#16213e" stroke="#4ecdc4"/>
  <text x="685" y="178" fill="#4ecdc4" font-size="13" font-weight="bold">Route Statistics</text>
  <text x="685" y="200" fill="#eaeaea" font-size="11">Cycles: 12</text>
  <text x="785" y="200" fill="#eaeaea" font-size="11">Avg Cycle: 6m 45s</text>
  <text x="685" y="222" fill="#eaeaea" font-size="11">Items/Cycle: 1.8</text>
  <text x="785" y="222" fill="#eaeaea" font-size="11">Value/Cycle: 4.2 pts</text>

  <!-- Chart 1: Duration over time -->
  <rect x="250" y="250" width="395" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="275" fill="#a0a0a0" font-size="12">Duration per Run (Efficiency)</text>
  <polyline points="290,420 320,400 350,415 380,380 410,390 440,370 470,385 500,360 530,375 560,350 590,365 620,340" fill="none" stroke="#4ecdc4" stroke-width="2"/>
  <line x1="290" y1="430" x2="620" y2="430" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="290" y1="290" x2="290" y2="430" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Chart 2: Rarity pie -->
  <rect x="665" y="250" width="395" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="685" y="275" fill="#a0a0a0" font-size="12">Rarity Distribution</text>
  <circle cx="860" cy="360" r="60" fill="none" stroke="#2a2a4a" stroke-width="1"/>
  <path d="M860,360 L860,300 A60,60 0 0,1 910,330 Z" fill="#e94560"/>
  <path d="M860,360 L910,330 A60,60 0 0,1 905,395 Z" fill="#4ecdc4"/>
  <path d="M860,360 L905,395 A60,60 0 0,1 860,420 Z" fill="#ffd700"/>
  <path d="M860,360 L860,420 A60,60 0 0,1 810,390 Z" fill="#6060ff"/>
  <path d="M860,360 L810,390 A60,60 0 0,1 820,315 Z" fill="#00c400"/>
  <path d="M860,360 L820,315 A60,60 0 0,1 860,300 Z" fill="#ff8c00"/>
  <text x="920" y="310" fill="#e94560" font-size="9">Unique 35%</text>
  <text x="930" y="370" fill="#4ecdc4" font-size="9">Rune 24%</text>
  <text x="910" y="420" fill="#ffd700" font-size="9">Set 18%</text>
  <text x="730" y="410" fill="#6060ff" font-size="9">Jewel 12%</text>
  <text x="730" y="360" fill="#00c400" font-size="9">Runeword 8%</text>
  <text x="750" y="310" fill="#ff8c00" font-size="9">Base 3%</text>

  <!-- Chart 3: Items per run -->
  <rect x="250" y="465" width="395" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="270" y="490" fill="#a0a0a0" font-size="12">Items per Run</text>
  <line x1="290" y1="640" x2="620" y2="640" stroke="#2a2a4a" stroke-width="1"/>
  <rect x="300" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="330" y="600" width="20" height="40" rx="2" fill="#e94560"/>
  <rect x="360" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="390" y="580" width="20" height="60" rx="2" fill="#e94560"/>
  <rect x="420" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="450" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="480" y="560" width="20" height="80" rx="2" fill="#e94560"/>
  <rect x="510" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="540" y="600" width="20" height="40" rx="2" fill="#e94560"/>
  <rect x="570" y="620" width="20" height="20" rx="2" fill="#e94560"/>
  <rect x="600" y="580" width="20" height="60" rx="2" fill="#e94560"/>

  <!-- Chart 4: Runs by area -->
  <rect x="665" y="465" width="395" height="200" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="685" y="490" fill="#a0a0a0" font-size="12">Runs by Area</text>
  <text x="690" y="520" fill="#a0a0a0" font-size="10">Mephisto</text>
  <rect x="790" y="507" width="220" height="18" rx="2" fill="#ffd700"/>
  <text x="690" y="548" fill="#a0a0a0" font-size="10">Ancient Tunnels</text>
  <rect x="790" y="535" width="150" height="18" rx="2" fill="#ffd700"/>
  <text x="690" y="576" fill="#a0a0a0" font-size="10">Chaos Sanctuary</text>
  <rect x="790" y="563" width="100" height="18" rx="2" fill="#ffd700"/>
  <text x="690" y="604" fill="#a0a0a0" font-size="10">Pindleskin</text>
  <rect x="790" y="591" width="70" height="18" rx="2" fill="#ffd700"/>
  <text x="690" y="632" fill="#a0a0a0" font-size="10">Countess</text>
  <rect x="790" y="619" width="45" height="18" rx="2" fill="#ffd700"/>
</svg>
